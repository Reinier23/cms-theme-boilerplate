{% set level = module.heat_level or 3 %}
{% set labels = ["", "Mild", "Medium", "Hot", "Very Hot", "Extreme"] %}
{% set label_text = module.custom_label or labels[level] %}

<div class="spice-meter" role="img" aria-label="Heat level {{ level }} of 5: {{ label_text }}">
  {% for i in range(1, 6) %}
    <svg class="spice-meter__pepper{% if i <= level %} is-active{% endif %}" 
         viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M12.2 3.2c.5-1.1 1.6-2 3-2 2 0 3.8 1.6 3.8 3.6 0 .7-.2 1.4-.6 2-.3.4-.2 1 .2 1.3 2 1.6 3 4.1 2.5 6.7-.6 3.4-3.5 6.3-7 6.9-2.6.4-5.1-.5-6.8-2.4-.4-.4-.4-1 0-1.4l9.1-9.1c.4-.4.5-1 .1-1.5-.5-.6-1.2-.9-2-.9-.9 0-1.8.4-2.5 1.1L7.2 9.4c-.7.7-1.8.7-2.5 0-.7-.7-.7-1.8 0-2.5l3-3c1.5-1.5 3.2-2.3 4.5-2.2z" 
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  {% endfor %}
  {% if module.show_label %}
    <span class="spice-meter__label">{{ label_text }}</span>
  {% endif %}
</div>
