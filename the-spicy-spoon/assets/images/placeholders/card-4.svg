<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="cardGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#7B68EE;stop-opacity:0.8"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#cardGradient4)"/>
  
  <!-- Recipe Content -->
  <g transform="translate(200, 150)">
    <!-- Main dish icon - fish -->
    <g transform="translate(0, -20)">
      <ellipse cx="0" cy="0" rx="60" ry="25" fill="rgba(255,255,255,0.9)"/>
      <circle cx="-35" cy="-8" r="3" fill="#333"/>
      <path d="M-60,-5 L-75,0 L-60,5 Z" fill="rgba(255,255,255,0.9)"/>
      <!-- Grill marks -->
      <line x1="-40" y1="-10" x2="-40" y2="10" stroke="#666" stroke-width="2"/>
      <line x1="-20" y1="-10" x2="-20" y2="10" stroke="#666" stroke-width="2"/>
      <line x1="0" y1="-10" x2="0" y2="10" stroke="#666" stroke-width="2"/>
      <line x1="20" y1="-10" x2="20" y2="10" stroke="#666" stroke-width="2"/>
    </g>
    
    <!-- Title -->
    <text x="0" y="40" text-anchor="middle" fill="white" font-family="sans-serif" font-size="20" font-weight="bold">
      Seafood Recipe
    </text>
    
    <!-- Subtitle -->
    <text x="0" y="60" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="sans-serif" font-size="14">
      400×300 • Recipe Card Placeholder
    </text>
    
    <!-- Decorative elements -->
    <circle cx="-120" cy="-80" r="6" fill="rgba(255,255,255,0.2)"/>
    <circle cx="130" cy="70" r="4" fill="rgba(255,255,255,0.15)"/>
    <circle cx="-140" cy="90" r="3" fill="rgba(255,255,255,0.1)"/>
  </g>
</svg>