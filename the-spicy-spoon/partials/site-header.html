<header class="site-header" role="banner">
  <div class="container">
    <div class="site-header__container">
      <!-- Logo -->
      <a href="/" class="site-header__logo" aria-label="The Spicy Spoon - Home">
        🌶️ The Spicy Spoon
      </a>
      
      <!-- Mobile Menu Toggle -->
      <button class="mobile-menu-toggle" type="button" aria-label="Toggle navigation menu" aria-expanded="false" data-mobile-toggle>
        <span class="sr-only">Menu</span>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      
      <!-- Main Navigation -->
      <nav class="site-header__nav" role="navigation" aria-label="Main navigation" data-mobile-menu>
        <ul>
          <li><a href="/" {% if request.path == "/" %}aria-current="page"{% endif %}>Home</a></li>
          <li><a href="/recipes" {% if "/recipes" in request.path %}aria-current="page"{% endif %}>Recipes</a></li>
          <li><a href="/collections" {% if "/collections" in request.path %}aria-current="page"{% endif %}>Collections</a></li>
          <li><a href="/about" {% if "/about" in request.path %}aria-current="page"{% endif %}>About</a></li>
          <li><a href="/contact" {% if "/contact" in request.path %}aria-current="page"{% endif %}>Contact</a></li>
        </ul>
        
        <!-- Search in Navigation (Mobile) -->
        <div class="header-search header-search--mobile">
          <form action="/recipes" method="get" role="search" aria-label="Search recipes">
            <div class="search-bar">
              <input 
                type="search" 
                name="q" 
                class="search-bar__input" 
                placeholder="Search spicy recipes..." 
                aria-label="Search recipes"
                {% if request.query_dict.q %}value="{{ request.query_dict.q }}"{% endif %}
              >
              <button type="submit" class="search-bar__button" aria-label="Search">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <circle cx="11" cy="11" r="8"></circle>
                  <path d="M21 21l-4.35-4.35"></path>
                </svg>
              </button>
            </div>
          </form>
        </div>
      </nav>
      
      <!-- Desktop Search -->
      <div class="header-search header-search--desktop">
        <form action="/recipes" method="get" role="search" aria-label="Search recipes">
          <div class="search-bar search-bar--compact">
            <input 
              type="search" 
              name="q" 
              class="search-bar__input" 
              placeholder="Search recipes..." 
              aria-label="Search recipes"
              {% if request.query_dict.q %}value="{{ request.query_dict.q }}"{% endif %}
            >
            <button type="submit" class="search-bar__button" aria-label="Search">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="M21 21l-4.35-4.35"></path>
              </svg>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
  
  <!-- Category Quick Links -->
  {% if request.path == "/" or "/recipes" in request.path %}
  <div class="category-bar">
    <div class="container">
      <div class="category-chips" role="navigation" aria-label="Recipe categories">
        <a href="/recipes?category=thai" class="chip">🇹🇭 Thai</a>
        <a href="/recipes?category=mexican" class="chip">🇲🇽 Mexican</a>
        <a href="/recipes?category=indian" class="chip">🇮🇳 Indian</a>
        <a href="/recipes?category=korean" class="chip">🇰🇷 Korean</a>
        <a href="/recipes?category=cajun" class="chip">🎺 Cajun</a>
        <a href="/recipes?category=chinese" class="chip">🇨🇳 Chinese</a>
        <a href="/recipes?heat=5" class="chip chip--hot">🔥 Extra Hot</a>
      </div>
    </div>
  </div>
  {% endif %}
</header>

<style>
/* Mobile Menu Styles */
.mobile-menu-toggle {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: var(--space-sm);
  color: var(--color-neutral-900);
}

.header-search--desktop {
  max-width: 300px;
}

.header-search--mobile {
  display: none;
  margin-top: var(--space-md);
}

.search-bar--compact {
  max-width: 300px;
}

.search-bar--compact .search-bar__input {
  padding: var(--space-sm) var(--space-md);
  font-size: var(--font-size-sm);
}

.search-bar--compact .search-bar__button {
  padding: var(--space-xs) var(--space-sm);
}

.category-bar {
  background: var(--color-white);
  border-top: 1px solid var(--color-neutral-200);
  padding: var(--space-sm) 0;
}

.category-chips {
  display: flex;
  gap: var(--space-sm);
  overflow-x: auto;
  padding: var(--space-xs) 0;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

.category-chips::-webkit-scrollbar {
  height: 4px;
}

.category-chips::-webkit-scrollbar-track {
  background: var(--color-neutral-100);
  border-radius: var(--border-radius);
}

.category-chips::-webkit-scrollbar-thumb {
  background: var(--color-neutral-400);
  border-radius: var(--border-radius);
}

.chip--hot {
  background: var(--color-primary);
  color: var(--color-white);
}

.chip--hot:hover {
  background: var(--color-accent);
}

/* Mobile Responsive */
@media (max-width: 768px) {
  .mobile-menu-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .site-header__nav {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--color-white);
    border-top: 1px solid var(--color-neutral-200);
    padding: var(--space-lg);
    z-index: 1000;
  }
  
  .site-header__nav.is-open {
    display: block;
  }
  
  .site-header__nav ul {
    flex-direction: column;
    gap: var(--space-md);
    margin-bottom: var(--space-lg);
  }
  
  .header-search--desktop {
    display: none;
  }
  
  .header-search--mobile {
    display: block;
  }
  
  .category-chips {
    padding: var(--space-sm) 0;
  }
}

/* Accessibility */
@media (prefers-reduced-motion: reduce) {
  .category-chips {
    scroll-behavior: auto;
  }
}

/* Focus states */
.mobile-menu-toggle:focus,
.site-header__nav a:focus,
.search-bar__input:focus,
.search-bar__button:focus {
  outline: 2px solid var(--color-primary);
  outline-offset: 2px;
}

/* Active/current page styling */
.site-header__nav a[aria-current="page"] {
  color: var(--color-primary);
  font-weight: 600;
}
</style>

<script>
// Mobile menu toggle
document.addEventListener('DOMContentLoaded', function() {
  const toggle = document.querySelector('[data-mobile-toggle]');
  const menu = document.querySelector('[data-mobile-menu]');
  
  if (toggle && menu) {
    toggle.addEventListener('click', function() {
      const isOpen = menu.classList.contains('is-open');
      menu.classList.toggle('is-open');
      toggle.setAttribute('aria-expanded', !isOpen);
    });
    
    // Close mobile menu when clicking outside
    document.addEventListener('click', function(e) {
      if (!toggle.contains(e.target) && !menu.contains(e.target)) {
        menu.classList.remove('is-open');
        toggle.setAttribute('aria-expanded', 'false');
      }
    });
    
    // Close mobile menu on escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && menu.classList.contains('is-open')) {
        menu.classList.remove('is-open');
        toggle.setAttribute('aria-expanded', 'false');
        toggle.focus();
      }
    });
  }
});
</script>
